---
# elastic-detection-lab
# Single-node Elasticsearch + Kibana + Filebeat with security enabled.
# Default credentials (lab use only!): elastic / changeme  — see README.md
name: elastic-detection-lab

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: edl-elasticsearch
    environment:
      - node.name=edl-es01
      - cluster.name=elastic-detection-lab
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

  # One-shot init container: sets the kibana_system password so Kibana can
  # connect (kibana_system cannot use the superuser bootstrap password).
  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: edl-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: >
      bash -c '
        until curl -s -u "elastic:${ELASTIC_PASSWORD:-changeme}" \
          -X POST http://elasticsearch:9200/_security/user/kibana_system/_password \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"${KIBANA_PASSWORD:-changeme}\"}" | grep -q "^{}"; do
          echo "Waiting to set kibana_system password..."; sleep 5;
        done;
        echo "kibana_system password set."
      '
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: edl-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    environment:
      - SERVERNAME=edl-kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      # Static key so detection rules / alerting survive container restarts.
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=edl-lab-encryption-key-32-chars-min!
      - XPACK_SECURITY_ENCRYPTIONKEY=edl-lab-security-key-32-chars-min-ok!
      - XPACK_REPORTING_ENCRYPTIONKEY=edl-lab-reporting-key-32-chars-min-!
    ports:
      - "5601:5601"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.3
    container_name: edl-filebeat
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: ["filebeat", "-e", "--strict.perms=false"]
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./sample-logs:/var/log/sample-logs:ro

volumes:
  esdata:
